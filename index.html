<script>
  // Sticky nav
  const navbar = document.getElementById('navbar');
  window.addEventListener('scroll', () => navbar.classList.toggle('scrolled', window.scrollY > 40));

  // Hamburger
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobileMenu');
  hamburger.addEventListener('click', () => { hamburger.classList.toggle('open'); mobileMenu.classList.toggle('open'); });
  document.querySelectorAll('.mob-link').forEach(l => l.addEventListener('click', () => { hamburger.classList.remove('open'); mobileMenu.classList.remove('open'); }));

  // Scroll reveal
  const io = new IntersectionObserver(entries => {
    entries.forEach((e, i) => { 
      if (e.isIntersecting) { 
        setTimeout(() => e.target.classList.add('visible'), i * 100); 
        io.unobserve(e.target); 
      } 
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));

  // Terminal typing
  const terminal = document.getElementById('heroTerminal');
  const msg = '> INIT_CHANNEL.exe — SIGNAL LOCKED. WELCOME, AGENT.';
  let idx = 0;
  setTimeout(() => {
    const iv = setInterval(() => {
      if (idx < msg.length) { 
        terminal.innerHTML = msg.slice(0, ++idx) + '<span class="cursor"></span>'; 
      } else clearInterval(iv);
    }, 38);
  }, 600);

  // Email form → Beehiiv + PDF
  document.getElementById('signupForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const email = document.getElementById('emailInput').value;
    if (!email) return;

    // 👉 OPTIONAL: open your PDF (make sure path is correct)
    window.open('assets/ai-survival-kit.pdf', '_blank');

    // 👉 Redirect to Beehiiv signup page
    window.location.href = 'https://synexcyberpunk.beehiiv.com/';

    // Show success message briefly (in case redirect is slow)
    this.style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
  });
</script>
